[build]
  base = "."
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  VITE_API_URL = "https://hospitality-hire-hub-api.onrender.com/api/v1"

[context.deploy-preview.environment]
  VITE_API_URL = "https://staging-api.hospitalityhirehub.com/api/v1"
